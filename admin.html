<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mr Coffee · Studio Admin</title>
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-page: #f5efe9;
      --surface: #ffffff;
      --primary: #b45f2b;
      --primary-dark: #8e4518;
      --primary-soft: #fae7d8;
      --accent: #2c7a4d;
      --danger: #dc4c3e;
      --danger-dark: #b91c1c;
      --gray-100: #f9f7f4;
      --gray-200: #ece5dd;
      --gray-600: #6b5b4f;
      --gray-800: #2f2a26;
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius-card: 24px;
      --radius-element: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--gray-800);
      padding: 28px 24px;
    }

    .admin-container {
      max-width: 1440px;
      margin: 0 auto;
    }

    /* header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 32px;
    }
    .logo-area h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, #a5531c 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .logo-area p {
      font-size: 0.85rem;
      color: var(--gray-600);
    }
    .user-badge {
      background: var(--surface);
      padding: 8px 18px;
      border-radius: 60px;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-badge i {
      color: var(--primary);
      font-size: 1.2rem;
    }
    .logout-btn {
      background: none;
      border: 1px solid var(--gray-200);
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      color: var(--gray-800);
    }
    .logout-btn:hover {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
    }

    /* login card */
    .login-card {
      max-width: 480px;
      margin: 80px auto;
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 32px;
      box-shadow: var(--shadow-md);
    }
    .login-card h2 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--primary);
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--gray-600);
    }
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-element);
      font-size: 0.95rem;
      transition: 0.2s;
    }
    .input-group input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(180, 95, 43, 0.2);
    }
    .btn-login {
      background: var(--primary);
      color: white;
      width: 100%;
      padding: 12px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-element);
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }
    .btn-login:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* admin panel */
    .stats-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border-radius: 28px;
      padding: 16px 24px;
      flex: 1;
      min-width: 140px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
    }
    .stat-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray-600);
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
    }

    /* search + filters */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 28px;
      align-items: center;
      justify-content: space-between;
    }
    .search-wrapper {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: 60px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      max-width: 320px;
    }
    .search-wrapper i {
      color: var(--gray-600);
    }
    .search-wrapper input {
      border: none;
      background: transparent;
      width: 100%;
      padding: 10px 0;
      font-size: 0.9rem;
      outline: none;
    }
    .category-filter {
      background: var(--surface);
      border-radius: 60px;
      padding: 6px 16px;
      border: 1px solid var(--gray-200);
      font-weight: 500;
      cursor: pointer;
    }
    .reload-btn {
      background: var(--surface);
      border: 1px solid var(--gray-200);
      border-radius: 40px;
      padding: 8px 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    /* category accordion */
    .category-card {
      background: var(--surface);
      border-radius: 28px;
      margin-bottom: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      transition: all 0.2s;
    }
    .category-header {
      background: var(--gray-100);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 1.2rem;
      border-bottom: 1px solid transparent;
      transition: background 0.2s;
    }
    .category-header:hover {
      background: #f3ede7;
    }
    .category-header i {
      transition: transform 0.3s;
    }
    .category-items {
      padding: 20px 24px;
      display: none;
      background: white;
      gap: 16px;
      flex-direction: column;
    }
    .menu-row {
      background: var(--gray-100);
      border-radius: 20px;
      padding: 18px;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .menu-row.disabled-item {
      opacity: 0.5;
      background: #f9f4ef;
    }
    .row-grid {
      display: grid;
      grid-template-columns: 2fr 1.5fr 1fr 0.7fr 0.7fr 0.5fr;
      gap: 16px;
      align-items: center;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-group label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--gray-600);
      letter-spacing: 0.3px;
    }
    .field-group input, .field-group textarea {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.85rem;
      font-family: inherit;
      transition: 0.2s;
    }
    .field-group input:focus, .field-group textarea:focus {
      border-color: var(--primary);
      outline: none;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .save-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      font-size: 0.8rem;
    }
    .toggle-active {
      background: #eae3db;
      border-radius: 40px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .toggle-active.active {
      background: #e0f2e9;
      color: var(--accent);
    }
    .toggle-active.inactive {
      background: #ffe3e0;
      color: var(--danger);
    }
    .toast-message {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--gray-800);
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 500;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(8px);
      animation: slideUp 0.2s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .loading-spinner {
      text-align: center;
      padding: 60px;
      color: var(--primary);
    }
    hr {
      margin: 8px 0;
    }
    @media (max-width: 1000px) {
      .row-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .menu-row {
        margin-bottom: 12px;
      }
      .save-btn, .toggle-active {
        width: 100%;
        justify-content: center;
      }
    }
    i.fa, i.far {
      margin-right: 4px;
    }
  </style>
</head>
<body>
<div class="admin-container" id="appRoot">
  <!-- Login section -->
  <div id="loginSection" style="display: none;">
    <div class="login-card">
      <h2><i class="fas fa-crown"></i> Mr Coffee Studio</h2>
      <p style="margin-bottom: 24px;">Secure access · Menu manager</p>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="adminEmail" placeholder="admin@mrcoffee.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="adminPassword" placeholder="••••••">
      </div>
      <button class="btn-login" id="loginSubmitBtn"><i class="fas fa-key"></i> Sign in</button>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="adminPanel" style="display: none;">
    <div class="header">
      <div class="logo-area">
        <h1><i class="fas fa-mug-hot"></i> Menu Studio</h1>
        <p>Real-time sync · Update price, description, status & more</p>
      </div>
      <div class="user-badge">
        <i class="fas fa-user-check"></i>
        <span id="userEmailDisplay">admin@mrcoffee.com</span>
        <button class="logout-btn" id="logoutBtnAdmin"><i class="fas fa-sign-out-alt"></i> Exit</button>
      </div>
    </div>

    <div class="stats-bar" id="statsContainer">
      <div class="stat-card"><div class="stat-title">Total items</div><div class="stat-number" id="totalItems">0</div></div>
      <div class="stat-card"><div class="stat-title">Active items</div><div class="stat-number" id="activeItems">0</div></div>
      <div class="stat-card"><div class="stat-title">Categories</div><div class="stat-number" id="totalCategories">0</div></div>
    </div>

    <div class="toolbar">
      <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchMenuItem" placeholder="Search by name or description...">
      </div>
      <select id="categoryFilterSelect" class="category-filter">
        <option value="all">📁 All categories</option>
      </select>
      <button id="refreshDataBtn" class="reload-btn"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>

    <div id="menuItemsContainer">
      <div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Loading menu data...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // Firebase config (identical to original)
  const firebaseConfig = {
    apiKey: "AIzaSyC0dLDtzDqzrFhboRd2WK2l3katZsiM8ps",
    authDomain: "mr-coffee-menu.firebaseapp.com",
    projectId: "mr-coffee-menu",
    storageBucket: "mr-coffee-menu.appspot.com",
    messagingSenderId: "441734976978",
    appId: "1:441734976978:web:cb21ea3cacdf357de9e40b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // DOM elements
  const loginSection = document.getElementById('loginSection');
  const adminPanel = document.getElementById('adminPanel');
  const loginSubmit = document.getElementById('loginSubmitBtn');
  const emailInput = document.getElementById('adminEmail');
  const passwordInput = document.getElementById('adminPassword');
  const logoutBtn = document.getElementById('logoutBtnAdmin');
  const userEmailSpan = document.getElementById('userEmailDisplay');
  const menuContainer = document.getElementById('menuItemsContainer');
  const searchInput = document.getElementById('searchMenuItem');
  const categoryFilter = document.getElementById('categoryFilterSelect');
  const totalItemsSpan = document.getElementById('totalItems');
  const activeItemsSpan = document.getElementById('activeItems');
  const totalCategoriesSpan = document.getElementById('totalCategories');
  const refreshBtn = document.getElementById('refreshDataBtn');

  let menuDataCache = [];     // full raw items { id, name, desc, price, active, category, amName?, amDesc? }
  let unsubscribeSnapshot = null;
  let currentFilterCategory = "all";
  let searchTerm = "";

  // Helper: show toast
  function showToast(message, type = "success") {
    const existingToast = document.querySelector('.toast-message');
    if(existingToast) existingToast.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  // update stats based on filtered data? we'll update based on original menuDataCache
  function updateStatistics() {
    const total = menuDataCache.length;
    const active = menuDataCache.filter(item => item.active !== false).length;
    const uniqueCats = new Set(menuDataCache.map(i => i.category || 'Uncategorized'));
    totalItemsSpan.innerText = total;
    activeItemsSpan.innerText = active;
    totalCategoriesSpan.innerText = uniqueCats.size;
  }

  // populate category filter dropdown
  function populateCategoryFilter() {
    const cats = new Set(menuDataCache.map(i => i.category || 'Uncategorized'));
    const allOptions = '<option value="all">📁 All categories</option>' + 
      Array.from(cats).sort().map(cat => `<option value="${cat.replace(/"/g, '&quot;')}">📂 ${cat}</option>`).join('');
    categoryFilter.innerHTML = allOptions;
  }

  // render dynamic accordion + inline editing (full name, desc, price, active)
  function renderMenuUI() {
    if (!menuContainer) return;
    // group by category
    const grouped = new Map();
    menuDataCache.forEach(item => {
      const cat = item.category || 'Uncategorized';
      if (!grouped.has(cat)) grouped.set(cat, []);
      grouped.get(cat).push(item);
    });

    if (grouped.size === 0) {
      menuContainer.innerHTML = `<div style="text-align:center; padding:60px; background:white; border-radius:32px;"><i class="fas fa-utensils"></i> No menu items found</div>`;
      return;
    }

    let html = '';
    for (let [category, items] of grouped.entries()) {
      // filter by search and category dropdown (but category already grouped; we apply item-level filtering later)
      let filteredItems = items.filter(item => {
        const matchesCat = (currentFilterCategory === 'all' || item.category === currentFilterCategory);
        const matchesSearch = searchTerm === '' || 
          item.name?.toLowerCase().includes(searchTerm) || 
          (item.desc || '').toLowerCase().includes(searchTerm);
        return matchesCat && matchesSearch;
      });
      if (filteredItems.length === 0 && (currentFilterCategory !== 'all' || searchTerm !== '')) continue;

      html += `
        <div class="category-card" data-category="${category}">
          <div class="category-header">
            <span><i class="fas fa-tag"></i> ${category}</span>
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="category-items" style="display: none;">
      `;
      filteredItems.forEach(item => {
        const isActive = item.active !== false;
        const activeClass = isActive ? 'active' : 'inactive';
        const activeText = isActive ? 'Active' : 'Disabled';
        const rowDisabledClass = !isActive ? 'disabled-item' : '';
        html += `
          <div class="menu-row ${rowDisabledClass}" data-item-id="${item.id}">
            <div class="row-grid">
              <div class="field-group">
                <label>🍽️ Item name</label>
                <input type="text" class="item-name" value="${escapeHtml(item.name || '')}" placeholder="Name">
              </div>
              <div class="field-group">
                <label>📝 Description</label>
                <textarea class="item-desc" placeholder="Description">${escapeHtml(item.desc || '')}</textarea>
              </div>
              <div class="field-group">
                <label>💰 Price (Birr)</label>
                <input type="number" step="5" class="item-price" value="${item.price || 0}">
              </div>
              <div class="field-group">
                <label>📌 Status</label>
                <div class="toggle-active ${activeClass}" data-active="${isActive}">
                  <i class="fas ${isActive ? 'fa-toggle-on' : 'fa-toggle-off'}"></i> ${activeText}
                </div>
              </div>
              <div class="field-group">
                <button class="save-btn" data-id="${item.id}"><i class="fas fa-save"></i> Save changes</button>
              </div>
              <div class="field-group">
                <span style="font-size:11px; color:#9e8b7a;"><i class="far fa-clock"></i> ID: ${item.id.slice(0,6)}</span>
              </div>
            </div>
          </div>
        `;
      });
      html += `</div></div>`;
    }
    menuContainer.innerHTML = html;

    // attach event listeners for accordion toggle
    document.querySelectorAll('.category-header').forEach(header => {
      header.addEventListener('click', (e) => {
        const itemsDiv = header.parentElement?.querySelector('.category-items');
        if (itemsDiv) {
          const isVisible = itemsDiv.style.display === 'flex';
          itemsDiv.style.display = isVisible ? 'none' : 'flex';
          const icon = header.querySelector('i.fa-chevron-down');
          if(icon) icon.style.transform = isVisible ? 'rotate(0deg)' : 'rotate(180deg)';
        }
      });
    });

    // attach save buttons + toggle status
    document.querySelectorAll('.save-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const row = btn.closest('.menu-row');
        const itemId = row.getAttribute('data-item-id');
        const nameInput = row.querySelector('.item-name');
        const descTextarea = row.querySelector('.item-desc');
        const priceInput = row.querySelector('.item-price');
        const newName = nameInput?.value.trim() || "Unnamed";
        const newDesc = descTextarea?.value.trim() || "";
        const newPrice = parseFloat(priceInput?.value) || 0;
        
        try {
          await updateDoc(doc(db, "menu", itemId), {
            name: newName,
            desc: newDesc,
            price: newPrice
          });
          showToast(`✓ "${newName}" updated`, 'success');
        } catch (err) {
          showToast(`Error: ${err.message}`, 'error');
        }
      });
    });

    // Toggle active status
    document.querySelectorAll('.toggle-active').forEach(toggleDiv => {
      toggleDiv.addEventListener('click', async (e) => {
        e.stopPropagation();
        const row = toggleDiv.closest('.menu-row');
        const itemId = row.getAttribute('data-item-id');
        const currentActive = toggleDiv.getAttribute('data-active') === 'true';
        const newActive = !currentActive;
        try {
          await updateDoc(doc(db, "menu", itemId), { active: newActive });
          showToast(newActive ? 'Item enabled' : 'Item disabled', 'success');
        } catch(err) {
          showToast('Toggle failed', 'error');
        }
      });
    });
  }

  function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // load realtime snapshot
  function startFirestoreListener() {
    if (unsubscribeSnapshot) unsubscribeSnapshot();
    unsubscribeSnapshot = onSnapshot(collection(db, "menu"), (snapshot) => {
      menuDataCache = [];
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        menuDataCache.push({
          id: docSnap.id,
          name: data.name || 'Unnamed',
          desc: data.desc || '',
          price: data.price || 0,
          active: data.active !== undefined ? data.active : true,
          category: data.category || 'Other',
          amName: data.amName || '',
          amDesc: data.amDesc || ''
        });
      });
      updateStatistics();
      populateCategoryFilter();
      // reapply filters after data arrives
      renderMenuUI();
    }, (error) => {
      console.error(error);
      menuContainer.innerHTML = `<div class="login-card" style="margin:20px; color:red;">⚠️ Firestore error: ${error.message}</div>`;
    });
  }

  // filter handler
  function applyFilters() {
    currentFilterCategory = categoryFilter.value;
    searchTerm = searchInput.value.toLowerCase();
    renderMenuUI();
  }

  searchInput.addEventListener('input', () => {
    applyFilters();
  });
  categoryFilter.addEventListener('change', () => {
    applyFilters();
  });
  refreshBtn.addEventListener('click', () => {
    showToast('Refreshing...', 'success');
    renderMenuUI(); 
  });

  // Authentication
  const ADMIN_ALLOWED_EMAIL = "mrcoffee590@gmail.com";
  
  onAuthStateChanged(auth, (user) => {
    if (user && user.email === ADMIN_ALLOWED_EMAIL) {
      loginSection.style.display = 'none';
      adminPanel.style.display = 'block';
      userEmailSpan.innerText = user.email;
      startFirestoreListener();
    } else {
      if (user && user.email !== ADMIN_ALLOWED_EMAIL) {
        signOut(auth);
        alert("Access restricted: only owner email allowed.");
      }
      loginSection.style.display = 'block';
      adminPanel.style.display = 'none';
      if (unsubscribeSnapshot) unsubscribeSnapshot();
    }
  });

  loginSubmit.onclick = async () => {
    const email = emailInput.value.trim();
    const pwd = passwordInput.value;
    if (!email || !pwd) {
      showToast("Please enter credentials", "error");
      return;
    }
    try {
      await signInWithEmailAndPassword(auth, email, pwd);
      showToast("Login successful", "success");
    } catch (err) {
      showToast("Authentication failed: " + err.message, "error");
    }
  };

  logoutBtn.onclick = async () => {
    await signOut(auth);
    showToast("Logged out", "success");
  };

  // initial UI state: login visible if not logged
  if (auth.currentUser?.email !== ADMIN_ALLOWED_EMAIL) {
    loginSection.style.display = 'block';
    adminPanel.style.display = 'none';
  } else {
    loginSection.style.display = 'none';
    adminPanel.style.display = 'block';
    startFirestoreListener();
  }
</script>
</body>
</html>
